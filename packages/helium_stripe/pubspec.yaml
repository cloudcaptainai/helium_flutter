name: helium_stripe
description: "Helium Stripe One Tap Purchase SDK for Flutter (iOS only). Remotely build and auto-optimize paywalls (tryhelium.com)"
version: 3.2.3
homepage: https://tryhelium.com

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  helium_flutter: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: HeliumStripePlugin
